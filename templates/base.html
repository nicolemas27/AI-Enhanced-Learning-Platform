<!DOCTYPE html>
<html lang="{{ lang }}" data-theme="light">
<head>
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    {% block styles %}{% endblock %}
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #64748b;
            --text: #1e293b;
            --light-bg: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --nav-bg: rgba(15, 23, 42, 0.95);
            --body-bg: #0f172a;
            --body-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --secondary: #94a3b8;
            --text: #f1f5f9;
            --light-bg: #1e293b;
            --border: #334155;
            background: linear-gradient(135deg, #0f172a 60%, #1e293b 100%) !important;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.25), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] .site-header {
            background-color: var(--nav-bg);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
    
        /* Body dark mode */
        [data-theme="dark"] body {
            background: var(--body-gradient) !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background-color: var(--light-bg);
            margin-top: 80px;
            transition: var(--transition);
            line-height: 1.6;
        }

        .card {
            margin-bottom: 1.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
        
        .card-header {
            background-color: #f8f9fc;
            border-bottom: 1px solid #e3e6f0;
        }

        /* Modern Navbar */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1.5rem;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }

        [data-theme="dark"] .site-header {
            background-color: rgba(15, 23, 42, 0.85);
        }

        /* Progress Tracking Link */
        .progress-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1rem;
            border-radius: var(--radius);
            transition: var(--transition);
            margin-right: 0;
            background: rgba(99, 102, 241, 0.1);
        }
        .nav-left {
            display: flex;
            gap: 0.75rem;
            margin-right: auto;
            align-items: center;
        }
        .progress-link:hover {
            background: rgba(99, 102, 241, 0.2);
            transform: translateY(-1px);
        }
        .progress-link i {
            font-size: 1.1rem;
        }

        /* Auth Links */
        .auth-links {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .auth-links a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.6rem 1rem;
            border-radius: var(--radius);
            transition: var(--transition);
        }
        .auth-links a:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
        .auth-links .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .auth-links .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }
        .auth-links .user-email {
            color: var(--secondary);
            font-size: 0.95rem;
            margin-right: 0.5rem;
            font-weight: 500;
        }

        /* Language Switcher */
        .language-switcher {
            position: relative;
        }
        .language-switcher select {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 1rem 0.6rem 0.75rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            appearance: none;
            padding-right: 2rem;
            color: var(--text);
        }
        [data-theme="dark"] .language-switcher select {
            background: rgba(15, 23, 42, 0.7);
        }
        .language-switcher select:hover {
            border-color: var(--primary);
        }
        .language-switcher::after {
            content: "⌄";
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--secondary);
        }

        /* Spinner */
        #langSpinner {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }

        /* Theme Toggle */
        .theme-toggle {
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.5rem;
            border-radius: 50%;
            transition: var(--transition);
        }
        .theme-toggle:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Main content container */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        @media (max-width: 768px) {
            .site-header {
                padding: 1rem;
                gap: 1rem;
            }
            .auth-links {
                gap: 0.5rem;
            }
            .main-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        
        <!-- Progress Tracking -->
        <div class="nav-left">
            <a href="{{ url_for('index') }}" class="progress-link">
                <i class="fas fa-home"></i>
                <span data-translate="home">Home</span>
            </a>
            <a href="{{ url_for('progress_dashboard') }}" class="progress-link">
                <i class="fas fa-chart-line"></i>
                <span data-translate="progress">Progress</span>
            </a>
        </div>

        <div class="auth-links">
            {% if current_user.is_authenticated %}
                <span class="user-email">{{ current_user.email }}</span>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-primary">
                    <span data-translate="logout">Logout</span>
                </a>
            {% else %}
                <a href="{{ url_for('auth.login') }}">
                    <span data-translate="login">Login</span>
                </a>
                <a href="{{ url_for('auth.signup') }}" class="btn btn-sm btn-primary">
                    <span data-translate="signup">Sign Up</span>
                </a>
            {% endif %}
        </div>

        <button class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </button>

        <div class="language-switcher">
            <select id="languageSelect" class="form-select border-0 shadow-sm">
                <option value="en">🌐 English</option>
                <option value="hi">🇮🇳 हिन्दी</option>
                <option value="fr">🇫🇷 Français</option>
                <option value="de">🇩🇪 Deutsch</option>
                <option value="mr">🇮🇳 मराठी</option>
            </select>
            <div class="spinner-border spinner-border-sm d-none" id="langSpinner"></div>
        </div>
    </header>

    <!-- Page Content -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Common JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // THEME TOGGLE FUNCTIONALITY
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            if (theme === 'dark') {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        
        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 
                         (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);
        
        // Toggle theme on button click
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // DEBOUNCE FUNCTION
        function debounce(func, timeout = 500) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => { func.apply(this, args); }, timeout);
            };
        }

        // TRANSLATION CORE LOGIC
        let currentLang = localStorage.getItem('selectedLang') || 'en';
        let translationCache = JSON.parse(localStorage.getItem('translationCache') || '{}');

        const translateContent = debounce(async (targetLang) => {
            const select = document.getElementById('languageSelect');
            const spinner = document.getElementById('langSpinner');
            
            try {
                select.disabled = true;
                spinner.classList.remove('d-none');
                
                const elements = document.querySelectorAll('[data-translate]');
                const batch = {};

                elements.forEach(el => {
                    if(!el.dataset.original) {
                        const key = el.dataset.translate;
                        const text = el.textContent.trim() || el.placeholder;
                        if(text) {
                            el.dataset.original = text;
                            batch[key] = text;
                        }
                    }
                });

                const needsTranslation = Object.entries(batch)
                    .filter(([key, text]) => !translationCache[`${targetLang}:${text}`])
                    .reduce((acc, [key, text]) => ({ ...acc, [key]: text }), {});

                if(Object.keys(needsTranslation).length > 0) {
                    const response = await fetch('/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: needsTranslation,
                            target_lang: targetLang
                        })
                    });
                    
                    const newTranslations = await response.json().catch(() => ({}));
                    
                    Object.entries(newTranslations).forEach(([key, trans]) => {
                        const original = batch[key];
                        translationCache[`${targetLang}:${original}`] = trans || original;
                    });
                    
                    localStorage.setItem('translationCache', JSON.stringify(translationCache));
                }

                elements.forEach(el => {
                    const key = el.dataset.translate;
                    const original = el.dataset.original;
                    const cacheKey = `${targetLang}:${original}`;
                    
                    if(translationCache[cacheKey]) {
                        if(el.tagName === 'INPUT') {
                            el.placeholder = translationCache[cacheKey];
                        } else {
                            el.textContent = translationCache[cacheKey];
                        }
                    }
                });

                localStorage.setItem('selectedLang', targetLang);
                document.documentElement.lang = targetLang;

            } catch (error) {
                console.error('Translation error:', error);
            } finally {
                select.disabled = false;
                spinner.classList.add('d-none');
            }
        });

        // INITIALIZE ON LOAD
        document.addEventListener('DOMContentLoaded', () => {
            const langSelect = document.getElementById('languageSelect');
            langSelect.value = currentLang;
            
            langSelect.addEventListener('change', (e) => {
                translateContent(e.target.value);
            });
            
            if(currentLang !== 'en') {
                translateContent(currentLang);
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
